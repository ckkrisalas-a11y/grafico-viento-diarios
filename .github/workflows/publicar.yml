name: generar-y-publicar #hola 

on:
  schedule:
    - cron: "17 * * * *"
      timezone: "America/Santiago"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Diagnóstico de hora y rama
        run: |
          echo "Evento: ${GITHUB_EVENT_NAME}"
          echo "Rama : ${GITHUB_REF_NAME}"
          echo "UTC  : $(date -u '+%Y-%m-%d %H:%M:%S %Z')"
          TZ=America/Santiago date '+Chile: %Y-%m-%d %H:%M:%S %Z'

      - name: Verificar navegador disponible
        run: |
          google-chrome --version
          chromedriver --version || true

      - name: Ejecutar script
        env:
          MI_PASSWORD: ${{ secrets.MI_PASSWORD }}
        run: |
          python scripts/generar.py

      - name: Verificar salida generada
        run: |
          ls -R site
          test -d site
          test -f site/index.html

      - name: Subir artefacto Pages
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
